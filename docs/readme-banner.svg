  </text>

  <path d="M344 242h86" stroke="#5ed4a8" stroke-width="4" stroke-linecap="round" />
  <path d="M430 242l-14-10v20z" fill="#5ed4a8" />

  <rect x="452" y="156" width="252" height="96" rx="14" fill="#132f3a" stroke="#236a82" />
  <text
    x="480"
    y="196"
    fill="#ffffff"
    font-family="Inter, Arial, sans-serif"
    font-size="22"
    font-weight="700"
