<svg
  xmlns="http://www.w3.org/2000/svg"
  width="1200"
  height="420"
  viewBox="0 0 1200 420"
  role="img"
  aria-labelledby="title desc"
>
  <title id="title">Tenkit Active Setup workflow</title>
  <desc id="desc">
    One Expo codebase resolves an Active Setup into App Variants and Runtime Tenants through the
    Tenkit CLI.
  </desc>
  <rect width="1200" height="420" rx="28" fill="#101820" />
  <text
