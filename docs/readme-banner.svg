  </text>

  <rect x="452" y="276" width="252" height="96" rx="14" fill="#2e2536" stroke="#684d7c" />
  <text
    x="480"
    y="316"
    fill="#ffffff"
    font-family="Inter, Arial, sans-serif"
    font-size="22"
    font-weight="700"
